<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delegate voice agent</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; overflow: hidden; background: #fff; color: #111; }
    #identity { min-height: 100vh; display: grid; place-items: center; padding: 40px; text-align: center; }
    #presentation { position: fixed; inset: 0; display: none; background: #fff; }
    #presentation.visible { display: block; }
    #browser-frame { display: block; width: 100%; height: 100%; border: 0; background: #fff; }
    h1 { margin: 0; font-size: clamp(27px, 4vw, 44px); font-weight: 650; letter-spacing: -1.9px; }
  </style>
</head>
<body>
  <main id="identity">
    <h1 id="agent-name">Delegate - representative</h1>
  </main>
  <main id="presentation" aria-label="Delegate browser presentation">
    <iframe id="browser-frame" title="Delegate shared browser" sandbox="allow-same-origin allow-scripts" allow="clipboard-read; clipboard-write"></iframe>
  </main>
  <script type="module" src="/voice-agent.js"></script>
</body>
</html>
